services:
  api:
    build:
      context: .
      dockerfile: DataCrawler.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - .:/app/data
    depends_on:
      - worker

  worker:
    build:
      context: .
      dockerfile: DataCrawler.Worker/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - .:/app/data